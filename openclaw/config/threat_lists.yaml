# ==============================================================================
# AEGIS Threat Intelligence Lists — Configurable by SOC team
# ==============================================================================
# These lists are referenced by the Triage SKILL.md for heuristic scoring.
# Update without redeploying by editing this file and restarting OpenClaw.
# ==============================================================================

# Known dangerous processes — each match adds +40 to severity score
dangerous_processes:
  - mimikatz
  - mimikatz.exe
  - procdump
  - procdump.exe
  - psexec
  - psexec.exe
  - wce
  - wce.exe
  - fgdump
  - fgdump.exe
  - gsecdump
  - gsecdump.exe
  - lsass
  - ntdsutil
  - ntdsutil.exe
  - lazagne
  - lazagne.exe
  - rubeus
  - rubeus.exe
  - sharphound
  - sharphound.exe

# Known C2 (Command & Control) ports — each match adds +30 to severity score
c2_ports:
  - 4444   # Metasploit default
  - 5555   # Common reverse shell
  - 1337   # Elite / leet port
  - 8888   # Alternative HTTP
  - 9001   # Tor common
  - 6666   # IRC botnet
  - 6667   # IRC
  - 31337  # Back Orifice
  - 12345  # NetBus

# Triage severity thresholds
severity_thresholds:
  P0: 61    # Score >= 61 → P0 (Critical)
  P1: 41    # Score >= 41 → P1 (High)
  P2: 21    # Score >= 21 → P2 (Medium)
  BENIGN: 0 # Score <= 20 → BENIGN

# Scoring weights per condition
scoring_weights:
  dangerous_process: 40
  webserver_parent_cmd_child: 35
  c2_port: 30
  privilege_escalation_event: 50
  exfiltration_hint_event: 50
  ip_historical_correlation: 20
